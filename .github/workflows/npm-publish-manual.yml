# Manually triggered publish workflow.
# Bumps the package version, commits the change, pushes a tag, then publishes to npm.
# Requires the following repository secret:
#   NPM_TOKEN  – an npm Automation or Publish token with write access to the package.
# Requires the following repository permission:
#   Allow GitHub Actions to create and approve pull requests (Settings → Actions → General)

name: Publish to npm (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.2.3) — must be SemVer, no leading 'v'"
        required: true
      tag:
        description: "npm dist-tag (e.g. latest, next, beta)"
        required: false
        default: latest

permissions:
  contents: write  # needed to push version-bump commit and tag
  id-token: write  # required for npm provenance attestation

jobs:
  validate:
    name: Validate version input
    runs-on: ubuntu-latest
    steps:
      - name: Check semver format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$'; then
            echo "::error::Version '${VERSION}' is not valid SemVer (expected X.Y.Z)"
            exit 1
          fi

  test:
    name: Test
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  publish:
    name: Bump, tag and publish
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a PAT or the default GITHUB_TOKEN with write permission
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in package.json and commit
        run: |
          npm version "${{ github.event.inputs.version }}" \
            --no-git-tag-version \
            --allow-same-version
          git add package.json package-lock.json
          git commit -m "chore: release v${{ github.event.inputs.version }}"
          git push

      - name: Create and push git tag
        run: |
          git tag -a "v${{ github.event.inputs.version }}" \
            -m "Release v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Publish to npm
        run: |
          npm publish \
            --access public \
            --provenance \
            --tag "${{ github.event.inputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_RELEASE }}
